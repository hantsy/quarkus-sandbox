name: graphql

on:
  push:
    paths:
      - "graphql/**"
    branches:
      - master
  pull_request:
    paths:
      - "graphql/**"
    types:
      - opened
      - synchronize
      - reopened

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: "25"
          cache: "maven"
                      
      - name: Build with Maven
        run: mvn clean install --file graphql/pom.xml